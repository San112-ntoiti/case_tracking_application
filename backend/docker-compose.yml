version: "3.9"

# Kenya Court Case Tracker — Docker Compose (Development)
# Starts: PostgreSQL, Redis, Django API, Celery Worker, Celery Beat
# Run: docker compose up --build

services:
  # ── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: court_tracker_db
    environment:
      POSTGRES_DB:       court_tracker
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + result backend) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: court_tracker_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django REST API ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: court_tracker_api
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --no-input &&
             python manage.py seed_data &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload"
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker (task execution) ────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: court_tracker_celery
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - api
      - redis

  # ── Celery Beat (scheduled tasks) ─────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: court_tracker_beat
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - api
      - redis

volumes:
  postgres_data:
  media_data:
