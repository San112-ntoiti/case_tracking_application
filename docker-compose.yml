version: "3.9"

# Kenya Court Case Tracker — Full Stack Docker Compose
# Orchestrates: PostgreSQL, Redis, Django API, Celery worker, Celery beat, React frontend (Nginx)
#
# Usage:
#   cp backend/.env.example backend/.env   (fill in real values)
#   docker compose up --build
#
# Frontend: http://localhost:3000
# Backend API: http://localhost:8000/api/v1
# API Docs (Swagger): http://localhost:8000/api/docs/

services:
  # ── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: court_tracker_db
    environment:
      POSTGRES_DB:       court_tracker
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + result backend) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: court_tracker_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django REST API ───────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: court_tracker_api
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --no-input &&
             python manage.py seed_data &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload"
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker (async notification dispatch) ───────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: court_tracker_celery
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - api
      - redis

  # ── Celery Beat (scheduled tasks: subscription expiry, hearing reminders) ─
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: court_tracker_beat
    command: celery -A config beat --loglevel=info
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - api
      - redis

  # ── React Frontend (built + served via Nginx) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    container_name: court_tracker_frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  media_data:
